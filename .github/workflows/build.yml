name: 🍎 Build iOS Emoji Changer APK

on:
  push:
    branches: [ "main", "copilot/**" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:          # allow manual trigger from GitHub UI

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. JDK 17 ─────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Gradle cache ────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── 4. Grant execute permission ────────────────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── 5. Download Gradle wrapper JAR ─────────────────────────────────────
      - name: Download Gradle wrapper jar
        run: |
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar"

      # ── 6. Build debug APK ─────────────────────────────────────────────────
      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx2g"

      # ── 7. Upload APK artifact ─────────────────────────────────────────────
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: VivoiOSEmojiChanger-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: error

      # ── 8. Print download instructions ────────────────────────────────────
      - name: Print APK download link instructions
        run: |
          echo "======================================================"
          echo "  ✅  APK built successfully!"
          echo "======================================================"
          echo ""
          echo "  📥 How to download the APK:"
          echo ""
          echo "  1. Go to this workflow run on GitHub:"
          echo "     ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo ""
          echo "  2. Scroll to the bottom of the page."
          echo ""
          echo "  3. Under 'Artifacts', click:"
          echo "     VivoiOSEmojiChanger-debug-${{ github.run_number }}"
          echo ""
          echo "  4. A ZIP file will download containing the APK."
          echo "     Extract it and install on your Vivo device."
          echo ""
          echo "  ℹ️  Enable 'Install from unknown sources' in Vivo Settings"
          echo "      before installing."
          echo "======================================================"

  # ── Release build (only on tags) ────────────────────────────────────────
  release:
    name: Build Release APK
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Download Gradle wrapper jar
        run: |
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar"

      - name: Build release APK (unsigned)
        run: ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx2g"

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: VivoiOSEmojiChanger-release-${{ github.ref_name }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          name: "Vivo iOS Emoji Changer ${{ github.ref_name }}"
          body: |
            ## 🍎 Vivo iOS Emoji Changer ${{ github.ref_name }}

            ### Installation
            1. Download the APK below
            2. Enable **Install from unknown sources** on your Vivo device:
               Settings → Security → Unknown sources
            3. Open the downloaded APK and install
            4. Open the app and tap **Apply iOS Emojis**

            ### What's included
            - One-click iOS emoji installation
            - System font directory injection (7 methods)
            - Custom iOS emoji keyboard (IME)
            - Accessibility service for system-wide coverage
            - ADB command generator for full system coverage
            - Smart pack auto-selection
            - Auto-reapply on boot
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
